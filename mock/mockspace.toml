project_name = "hilavitkutin"
crate_prefix = "hilavitkutin"
abi_version = 1

proc_macro_crates = []
module_crates = []

# Which macro to track per-crate in domain items
primary_domain_macro = "wu"
primary_domain_label = "WorkUnits"

# Layer labels by depth index
layers = [
    "API",          # hilavitkutin-api (contracts)
    "Engine",       # hilavitkutin (plan/dispatch/exec)
    "Build",        # hilavitkutin-build (LLVM/MIR)
    "Ext:ctx",      # hilavitkutin-ctx
    "Ext:persist",  # hilavitkutin-persistence
    "Ext:str",      # hilavitkutin-str
]

# Domain kind labels for STRUCTURE.md domain items table
[domain_kinds]
wu = "WorkUnit"

# Known macros for DESIGN.md table (description | usage)
[known_macros]

# Crate header colors for dependency graph (bg_color | fg_color)
[crate_colors]
hilavitkutin-api = "#E8EEF7 | #3A6EA5"
hilavitkutin = "#EDE6F3 | #5C2D82"
hilavitkutin-build = "#FDF0E0 | #C05C00"
hilavitkutin-ctx = "#E6F2E6 | #2D6A2D"
hilavitkutin-persistence = "#E6F2E6 | #2D6A2D"
hilavitkutin-str = "#E6F2E6 | #2D6A2D"

# ---------------------------------------------------------------------------
# Lint configuration
# ---------------------------------------------------------------------------

# --- Built-in quality lints ------------------------------------------------

[lints.no-empty-crate]
commit = "off"
build = "warn"
push = "warn"

[lints.no-todo]
commit = "off"
build = "warn"
push = "error"

[lints.no-fixme]
commit = "off"
build = "warn"
push = "error"

[lints.file-size]
commit = "warn"
build = "warn"
push = "error"
max_lines = "500"

# --- Custom hilavitkutin lints (mock/lints/*.rs) ---------------------------
# Hard errors: structural invariants. Violations must be fixed, never
# suppressed except per-line with `// lint:allow(<name>) -- <reason>`.

[lints.no-std]
commit = "error"
build = "error"
push = "error"

[lints.no-alloc]
commit = "error"
build = "error"
push = "error"

[lints.no-dynamic-dispatch]
commit = "error"
build = "error"
push = "error"

[lints.no-runtime-spawn]
commit = "error"
build = "error"
push = "error"

[lints.no-runtime-registration]
commit = "error"
build = "error"
push = "error"

# Advisory: vocabulary terms are common English words; warn everywhere,
# never block. Author suppresses with `// lint:allow(vocabulary-discipline)`.
[lints.vocabulary-discipline]
commit = "warn"
build = "warn"
push = "warn"

# --- Config-driven forbidden-imports (layer/boundary discipline) -----------
# Enforces module-path boundaries the token-level lints cannot express.

[lints.forbidden-imports]
commit = "warn"
build = "error"
push = "error"
rules = [
    # No std / alloc anywhere in the engine (belt for the no_std / no_alloc
    # Rust lints' suspenders).
    { scope = "hilavitkutin*", forbidden = "std::*, alloc::*", reason = "hilavitkutin is no_std + no_alloc in every crate" },

    # API is contracts only — must never depend on engine internals.
    { scope = "hilavitkutin-api", forbidden = "hilavitkutin::*", reason = "hilavitkutin-api is the contract; the engine is one implementation. Contracts cannot depend on implementations." },

    # Build-time crate has zero runtime linkage.
    { scope = "hilavitkutin-build", forbidden = "hilavitkutin::*, hilavitkutin_api::*", reason = "hilavitkutin-build is build-dep-only and must not link into the runtime binary" },

    # Extensions are standalone sub-libraries — no cross-deps, no engine dep.
    { scope = "hilavitkutin-ctx", forbidden = "hilavitkutin::*, hilavitkutin_api::*, hilavitkutin_persistence::*, hilavitkutin_str::*", reason = "hilavitkutin-ctx is a standalone extension; keep it independently usable" },
    { scope = "hilavitkutin-persistence", forbidden = "hilavitkutin::*, hilavitkutin_api::*, hilavitkutin_ctx::*, hilavitkutin_str::*", reason = "hilavitkutin-persistence is a standalone extension; keep it independently usable" },
    { scope = "hilavitkutin-str", forbidden = "hilavitkutin::*, hilavitkutin_api::*, hilavitkutin_ctx::*, hilavitkutin_persistence::*", reason = "hilavitkutin-str is a standalone extension; keep it independently usable" },
    { scope = "hilavitkutin-extensions", forbidden = "hilavitkutin::*, hilavitkutin_api::*, hilavitkutin_ctx::*, hilavitkutin_persistence::*, hilavitkutin_str::*", reason = "hilavitkutin-extensions is the plugin-host loader primitive; it must stay domain-agnostic and must not depend on engine, api, or other extensions" },

    # Engine consumes arvo bit contracts via the L2 `arvo-bitmask` surface,
    # never directly from L1 `arvo-bits`. Direct L1 coupling would bypass the
    # intended architecture layering (per arvo's own `.claude/rules`).
    { scope = "hilavitkutin", forbidden = "arvo_bits::*", reason = "engine reaches bit contracts via L2 arvo-bitmask; direct L1 coupling bypasses the layering" },
]

# --- Built-in mockspace lints that don't apply to hilavitkutin -------------
# Disables a family of lints carried over from loimu (the original home of
# mockspace) that encode loimu's plugin / registrable / visibility-macro
# conventions. hilavitkutin is no_std + no_alloc + no_dyn + no runtime
# registration; the native lints cover those invariants. The loimu-ancestry
# lints are irrelevant noise in this project and match the disables used in
# saalis's mockspace.toml (which originated hilavitkutin-ctx / -persistence
# / -str).

[lints.no-bare-pub]
commit = "off"
build = "off"
push = "off"

[lints.registrable-completeness]
commit = "off"
build = "off"
push = "off"

[lints.no-bare-macro-types]
commit = "off"
build = "off"
push = "off"

# --- Drift-catching primitive-vocabulary lints (task #84) ------------------
# Enabled at warn pending the sweep (#72) that will migrate Option/Result
# → Maybe/Outcome, Vec → trait-bound sinks, String → Str. Upgrade to error
# once the sweep lands. Part of the primitive-vocabulary retrofit after
# fidelity audit 2026-04-20 surfaced 15 bare Option uses + raw String/usize
# across the engine.

[lints.no-bare-result]
commit = "off"
build = "warn"
push = "warn"

[lints.no-bare-string]
commit = "off"
build = "warn"
push = "warn"

# New scope post-enforcement-tightening (2026-04-20): lints now scan every
# src/*.rs via LintContext.all_sources (hiisi-digital/mockspace#4) AND skip
# per-primitive per-crate via LintContext.introduces()
# (mockspace-hilavitkutin-stack-lints#3). 559 pre-existing drift sites in
# hilavitkutin source surface after the tightening — each is a sweep
# target under in-flight #72 sub-sweeps (str / ctx / engine). Ramp to warn
# at every gate; FLIP BACK TO `error` once #72 completes.

[lints.no-bare-numeric]
commit = "off"
build = "warn"
push = "warn"

[lints.no-bare-option]
commit = "off"
build = "warn"
push = "warn"

[lints.arvo-types-only]
commit = "off"
build = "warn"
push = "warn"

[lints.no-public-raw-field]
commit = "off"
build = "warn"
push = "warn"

[lints.no-bare-vec]
commit = "off"
build = "warn"
push = "warn"

# Pre-hilavitkutin-str crates must gate any `const NAME: &str` / `static
# NAME: &str` behind `#[cfg(debug_assertions)]`; hilavitkutin-str itself
# declares the `static-string` category in [primitive-introductions]
# below and is exempt (task #125).
[lints.no-bare-static-str]
commit = "off"
build = "warn"
push = "warn"

[lints.no-box]
commit = "off"
build = "warn"
push = "warn"

[lints.no-float]
commit = "off"
build = "warn"
push = "warn"

[lints.no-manual-id]
commit = "off"
build = "off"
push = "off"

[lints.no-primitive-key]
commit = "off"
build = "off"
push = "off"

[lints.no-raw-error-outside-primitives]
commit = "off"
build = "off"
push = "off"

[lints.no-self-define]
commit = "off"
build = "off"
push = "off"

[lints.no-pool-access]
commit = "off"
build = "off"
push = "off"

[lints.no-adhoc-error-enum]
commit = "off"
build = "off"
push = "off"

[lints.no-adhoc-framework]
commit = "off"
build = "off"
push = "off"

[lints.no-entry-suffix]
commit = "off"
build = "off"
push = "off"



# Pack lints — graceful ramp. These fire against pre-existing code that
# will be fixed in the respective sweep (#72). Set to advisory during
# the sweep, flip to error afterwards.
[lints.lint-allow-requires-task-id]
severity = "advisory"

# ---------------------------------------------------------------------------
# External lint packs (mockspace #94 feature)
# ---------------------------------------------------------------------------
#
# Git-based dep spec only — committed config must be portable.

[lint-crates]
mockspace-hilavitkutin-stack-lints = { git = "ssh://git@github.com/orgrinrt/mockspace-hilavitkutin-stack-lints.git", branch = "main" }

# Writing-style gate — pre-existing docs trip this until sweeps tidy them.
[lints.writing-style]
severity = "advisory"

# ---------------------------------------------------------------------------
# Primitive-substrate introducers (task #125)
# ---------------------------------------------------------------------------
#
# Categories (not specific type names) a crate legitimately defines.
# When a bare-primitive lint's category is in this list, the lint
# self-exempts for the crate — the crate IS the source-of-truth for
# that substrate. Categories stay stable as the stack evolves; adding
# a new designed type means tagging its introducer with the right
# category, no lint-pack change.
#
# hilavitkutin-str introduces the `static-string` substrate: it is
# the interning home that replaces bare `const NAME: &str` / `static
# NAME: &str` across the stack. Its own internals are the legitimate
# site for static string tables.

[primitive-introductions]
hilavitkutin-str = ["static-string"]
